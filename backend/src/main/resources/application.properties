spring.application.name=gestion-flota
# spring.data.mongodb.uri se resuelve automáticamente desde SPRING_DATA_MONGODB_URI (Railway)
server.port=${PORT:8080}
spring.jackson.serialization.fail-on-empty-beans=false

# JWT — override JWT_SECRET in Railway env vars before going to production
jwt.secret=${JWT_SECRET:carcaresaas-jwt-secret-key-change-me-in-prod!!}
jwt.expiration=86400000

# CORS — set CORS_ORIGINS in Railway to your frontend URL
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://10.0.2.2:3000}

# Max request/upload size — chat messages carry base64 audio/images (2MB binary ≈ 2.7MB base64)
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB
server.tomcat.max-http-form-content-size=15MB
server.tomcat.max-swallow-size=15MB

# Groq AI chat (driver assistant)
groq.api-key=${GROQ_API_KEY:}
groq.api-url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
